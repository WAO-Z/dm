<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>动漫磁力链接分享平台</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://lain.bgm.tv">
  <link rel="stylesheet" href="./styles.css?v4.3.0">
</head>

<body>
  <!-- 主容器：页面所有可见内容都放在这里，便于统一控制最大宽度。 -->
  <main class="app-shell">
    <!-- 顶部介绍区：展示站点标题、数据来源和资源统计。 -->
    <section class="hero-panel" aria-labelledby="page-title">
      <div class="hero-copy">
        <p class="eyebrow">Anime Magnet Shelf</p>
        <h1 id="page-title">动漫磁力链接分享</h1>
        <p class="hero-text">评分基于<a href="https://myanimelist.net/topanime.php" target="_blank"
            rel="noopener noreferrer">
            MyAnimeList
          </a>动漫评分网站</p>
      </div>
      <div class="hero-stats" aria-label="站点统计">
        <span><strong id="totalCount">0</strong>部作品</span>
        <span><strong id="linkCount">0</strong>条链接</span>
      </div>
    </section>

    <!-- 筛选工具栏：输入框负责关键字搜索，自定义下拉框负责分类、年份和排序。 -->
    <section class="toolbar" aria-label="筛选工具">
      <label class="search-box">
        <span>搜索</span>
        <input id="searchInput" type="search" placeholder="输入番名、年份或简介">
      </label>

      <label class="select-field">
        <span>类型</span>
        <div class="custom-select" data-select="genreFilter" data-value="all">
          <button class="select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span>全部类型</span>
            <span class="select-arrow">⌄</span>
          </button>
          <div class="select-menu" role="listbox">
            <button type="button" role="option" data-value="all" aria-selected="true">全部类型</button>
            <button type="button" role="option" data-value="tv">TV</button>
            <button type="button" role="option" data-value="movie">剧场版</button>
            <button type="button" role="option" data-value="ova">OVA</button>
          </div>
        </div>
      </label>

      <label class="select-field">
        <span>年份</span>
        <div class="custom-select" data-select="yearFilter" data-value="all">
          <button class="select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span>全部年份</span>
            <span class="select-arrow">⌄</span>
          </button>
          <div class="select-menu" role="listbox">
            <button type="button" role="option" data-value="all" aria-selected="true">全部年份</button>
          </div>
        </div>
      </label>

      <label class="select-field">
        <span>排序</span>
        <div class="custom-select" data-select="sortFilter" data-value="id">
          <button class="select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span>默认排序</span>
            <span class="select-arrow">⌄</span>
          </button>
          <div class="select-menu" role="listbox">
            <button type="button" role="option" data-value="id" aria-selected="true">默认排序</button>
            <button type="button" role="option" data-value="rating">评分最高</button>
            <button type="button" role="option" data-value="year">年份最新</button>
            <button type="button" role="option" data-value="title">标题 A-Z</button>
          </div>
        </div>
      </label>
    </section>

    <!-- aria-live 会把筛选结果数量变化通知给辅助技术。 -->
    <section class="result-strip" aria-live="polite">
      <p id="resultText">正在载入作品...</p>
      <button class="ghost-button" id="resetButton" type="button">重置筛选</button>
    </section>

    <!-- JS 会把 template 克隆成卡片并插入到这个网格里。 -->
    <section class="anime-grid" id="animeGrid" aria-label="动漫列表"></section>

    <!-- 分页按钮由 JS 根据筛选后的数量动态生成。 -->
    <nav class="pagination" id="pagination" aria-label="分页"></nav>

    <footer class="site-footer">
      <p>本页面仅用于动漫资源分享，请支持正版动漫。所有资源来源于网络，版权归原作者所有。</p>
      <p>© 2026 动漫磁力链接分享平台 | 设计：Codex</p>
    </footer>
  </main>

  <!-- 复制磁力链接后的轻提示。 -->
  <div class="toast" id="toast" role="status" aria-live="polite">已复制磁力链接</div>
  <button class="back-to-top" id="backToTop" type="button" aria-label="回到顶部">↑</button>

  <!-- 卡片模板不会直接显示，renderAnime 会 clone 它来生成每一张卡片。 -->
  <template id="animeCardTemplate">
    <article class="anime-card">
      <div class="cover-wrap">
        <img class="cover" alt="">
        <span class="rating-badge"></span>
      </div>
      <div class="card-content">
        <div class="title-row">
          <h2></h2>
          <span class="genre-pill"></span>
        </div>
        <p class="meta"></p>

        <div class="description-block">
          <p class="description"></p>
          <button class="text-button description-toggle" type="button" aria-expanded="false">展开简介</button>
        </div>

        <div class="magnet-block">
          <button class="magnet-toggle" type="button" aria-expanded="false">
            <span>展开磁力链接</span>
            <span class="chevron">⌄</span>
          </button>
          <div class="magnet-list" hidden></div>
        </div>
      </div>
    </article>
  </template>

  <script src="./app.js?v4.3.0"></script>
</body>

</html>
